services:
  flask:
    image: ${DOCKER_IMAGE}
    container_name: flask-microservice
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=microservice
      - APP_VERSION=${APP_VERSION}
      - FLASK_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=microservice
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d microservice"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data: